# gaal.yaml — example configuration
#
# Run once:    gaal sync
# Run as service (every 10 min): gaal --service --interval 10m
# Show status: gaal status

# gaal config schema version. Always 1 for gaal.
# This field is stable forever: future gaal releases will always read
# schema: 1 files. Breaking changes will use schema: 2 with a migration path.
schema: 1

# ─────────────────────────────────────────────────────────────────────────────
# repositories
#
# Compatible with the vcstool export format.
# Keys are local paths (relative or absolute).
# Supported types: git, hg, svn, bzr, tar, zip
# ─────────────────────────────────────────────────────────────────────────────
repositories:
  src/gaal:
    type: git
    url: https://github.com/example/gaal.git
    version: main

  src/tools/my-python-lib:
    type: git
    url: https://github.com/example/my-python-lib.git
    version: v2.1.0          # pin to a tag

  src/legacy/old-tool:
    type: svn
    url: https://svn.example.com/repos/old-tool/trunk
    version: "1234"          # SVN revision (optional)

  src/data/dataset:
    type: tar
    url: https://example.com/releases/dataset-2024.tar.gz
    version: dataset-2024    # strip this prefix during extraction

# ─────────────────────────────────────────────────────────────────────────────
# skills
#
# Install SKILL.md collections for your local coding agents.
# Sources:
#   - GitHub shorthand:  owner/repo
#   - Full URL:          https://github.com/owner/repo
#   - Git SSH:           git@github.com:owner/repo.git
#   - Local path:        ./path/to/skills  or  ~/my-skills
#
# agents: list agent names, or ["*"] to auto-detect installed agents.
# global: true  → install to ~/.<agent>/skills/  (user-wide)
#         false → install to ./<agent-dir>/skills/ (project-local, default)
# select: specific skill names to install (empty = all skills in the repo)
# ─────────────────────────────────────────────────────────────────────────────
skills:
  # Install all skills from vercel-labs/agent-skills to all detected agents.
  - source: vercel-labs/agent-skills
    agents: ["*"]
    global: false

  # Install only two specific skills to claude-code and github-copilot.
  - source: anthropics/skills
    agents:
      - claude-code
      - github-copilot
    select:
      - frontend-design
      - skill-creator
    global: false

  # Install from a full URL globally (available across all projects).
  - source: https://github.com/microsoft/github-copilot-for-azure
    agents:
      - github-copilot
    global: true

  # Install from a local directory. Per-skill `tools:` lists CLI binaries
  # that this skill expects to find on PATH; gaal doctor warns when any
  # are missing.
  - source: ./company-skills
    agents:
      - claude-code
      - cursor
    global: false
    tools:
      - tree-sitter
      - name: rg
        hint: "brew install ripgrep"

# ─────────────────────────────────────────────────────────────────────────────
# mcps
#
# Manage MCP (Model Context Protocol) server configuration entries.
# Each entry is upserted into the target JSON file under "mcpServers".
#
# source: URL to a remote JSON file containing an mcpServers document.
# inline: define the server entry directly in this file.
#         Stdio entries use command/args/env. HTTP entries use type/url/headers.
#         For HTTP header secrets, set headers.<name>.env to an environment
#         variable name; gaal writes the env reference, not the secret value.
# agents: list of agent identifiers (or ["*"] to target all agents).
#         The target JSON file is resolved automatically from the agent registry.
# global: true  → write to the agent's global MCP config (global_mcp_config_file)
#         false → write to the agent's project MCP config (project_mcp_config_file)
#         (default: true, since most agents only have a global MCP config)
#
# Deprecated: target — specify the path explicitly. Prefer agents+global instead.
# ─────────────────────────────────────────────────────────────────────────────
mcps:
  # Inline server — installed into claude-code's global MCP config.
  - name: filesystem
    agents: ["claude-code"]
    global: true
    inline:
      command: uvx
      args:
        - mcp-server-filesystem
        - /home/user/projects

  # Inline server — installed into all agents that have a global MCP config.
  - name: git
    agents: ["*"]
    global: true
    inline:
      command: uvx
      args:
        - mcp-server-git
        - --repository
        - /home/user/projects/gaal

  # Remote source — merged into claude-code and github-copilot's global configs.
  - name: github
    source: https://raw.githubusercontent.com/github/mcp-servers/main/config.json
    agents:
      - claude-code
      - github-copilot
    global: true

  - name: sequential-thinking
    agents: ["github-copilot"]
    global: true
    inline:
      command: npx
      args:
        - -y
        - "@modelcontextprotocol/server-sequential-thinking"

  # Native HTTP server with env-backed headers.
  - name: memory-mcp
    agents: ["codex", "claude-code"]
    global: true
    inline:
      type: http
      url: https://memory.example.com/mcp
      headers:
        CF-Access-Client-Id:
          env: CF_ACCESS_CLIENT_ID
        CF-Access-Client-Secret:
          env: CF_ACCESS_CLIENT_SECRET

# ─────────────────────────────────────────────────────────────────────────────
# tools
#
# CLI executables your workspace expects to find on PATH. gaal does not
# install tools — it checks for their presence and surfaces an optional hint
# when any are missing.
#
# Two shapes are accepted in a tools list:
#   - bare string:  `- gh`
#   - full mapping: `- {name: gh, hint: "brew install gh"}`
#
# Tool entries can also live inside an individual `skills:` entry above to
# document tools required by that specific skill. Top-level entries always
# win attribution if the same name appears in both places.
#
# Behaviour:
#   - `gaal doctor` reports each tool as ✓ (on PATH) or ⚠ (missing); any
#     missing tool raises doctor's exit code to 1.
#   - `gaal sync` prints a one-line banner per missing tool to stderr but
#     never blocks. Use `gaal doctor` to gate CI.
# ─────────────────────────────────────────────────────────────────────────────
tools:
  - gh                       # GitHub CLI — bare string, no hint
  - name: rtk                # Token-killer proxy
    hint: "cargo install rtk"
  - name: fnm                # Fast Node manager
    hint: "https://github.com/Schniz/fnm#installation"

# ─────────────────────────────────────────────────────────────────────────────
# hooks
#
# Run user-defined commands before and after every successful sync. Hooks
# use exec-form (command + args[]) so they remain portable across Linux,
# macOS, and Windows — no shell is involved.
#
# pre-sync runs before any resource is touched. A non-zero exit aborts the
#          sync (unless continue_on_error: true). Use for backups, gating
#          checks, etc. Pre-sync hooks see GAAL_PLANNED_REPOS,
#          GAAL_PLANNED_SKILLS, GAAL_PLANNED_MCPS env vars describing what
#          sync intends to change.
#
# post-sync runs only when sync (and any --prune) succeeded. Skipped on any
#          sync error. Post-sync hooks see GAAL_CHANGED_REPOS,
#          GAAL_CHANGED_SKILLS, GAAL_CHANGED_MCPS env vars (newline-separated
#          lists) describing what actually changed.
#
# Fields:
#   name              — optional label shown in logs and dry-run output
#   command           — executable; found on PATH unless given as a path
#   args              — list of arguments. ~/, $VAR, ${VAR} are expanded.
#   cwd               — working directory; defaults to gaal's workdir
#   os                — restrict to [linux | darwin | windows]; empty = all
#   timeout           — Go duration string, e.g. "30s", "2m". Default 5m.
#   continue_on_error — true → log a warning and keep going on non-zero exit
#   env               — extra environment variables for this hook
# ─────────────────────────────────────────────────────────────────────────────
hooks:
  pre-sync:
    - name: "snapshot working copies"
      command: ./scripts/backup.sh
      os: [linux, darwin]
      timeout: 1m
      continue_on_error: true

  post-sync:
    # Keep ~/.claude in sync with the dotclaude working copy after gaal
    # has updated everything else. Runs on every OS.
    - name: "pull dotclaude into ~/.claude"
      command: git
      args: ["-C", "~/.claude", "pull"]

    # Reload an MCP-using agent only when the MCP config actually changed.
    - name: "kick claude-code on mcp changes"
      command: sh
      args: ["-c", "test -n \"$GAAL_CHANGED_MCPS\" && pkill -HUP -f claude-code || true"]
      os: [linux, darwin]
      continue_on_error: true

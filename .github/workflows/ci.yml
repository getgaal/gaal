name: CI

# Triggered on every pull request.
# Also exposed as a reusable workflow so release.yml can call it.
on:
  pull_request:
  workflow_call:

permissions:
  contents: read

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Lint: gofmt formatting check + go vet (make lint)
  # ──────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Lint (gofmt + go vet)
        run: make lint

  # ──────────────────────────────────────────────────────────────────────────
  # Build: compile the binary on Linux, macOS, and Windows (make build)
  # ──────────────────────────────────────────────────────────────────────────
  build:
    name: Build / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: make build

  # ──────────────────────────────────────────────────────────────────────────
  # Test: unit tests with race detector on Linux, macOS, and Windows
  # (make test-race)
  # ──────────────────────────────────────────────────────────────────────────
  test:
    name: Test / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: make test-race

  # ──────────────────────────────────────────────────────────────────────────
  # Coverage: generate HTML report and post summary to the job summary page
  # ──────────────────────────────────────────────────────────────────────────
  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Generate coverage report
        run: make coverage-ci

      - name: Post coverage summary
        run: |
          echo "## Coverage Report" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat report/coverage-summary.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: report/
          retention-days: 30

name: Release

# Triggered when a version tag is pushed (e.g. v1.2.3).
# Can also be triggered manually for testing.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Reuse the full CI workflow: lint + build (3 OS) + test (3 OS) + coverage
  # ──────────────────────────────────────────────────────────────────────────
  ci:
    name: CI
    uses: ./.github/workflows/ci.yml
    permissions:
      contents: read

  # ──────────────────────────────────────────────────────────────────────────
  # Cross-compile release binaries for all supported platforms / architectures
  # Runs only after the full CI suite passes.
  # ──────────────────────────────────────────────────────────────────────────
  binaries:
    name: Binary / ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    needs: ci
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goos: linux,   goarch: amd64 }
          - { goos: linux,   goarch: arm64 }
          - { goos: darwin,  goarch: amd64 }
          - { goos: darwin,  goarch: arm64 }
          - { goos: windows, goarch: amd64, ext: .exe }
          - { goos: windows, goarch: arm64, ext: .exe }
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: >
          make build-cross
          BIN_CROSS=dist/gaal-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}

      - uses: actions/upload-artifact@v4
        with:
          name: gaal-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/gaal-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}
          if-no-files-found: error

  # ──────────────────────────────────────────────────────────────────────────
  # Create the GitHub Release and attach all compiled binaries
  # ──────────────────────────────────────────────────────────────────────────
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: binaries
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: gaal-*
          merge-multiple: true
          path: dist/

      - name: List release assets
        run: ls -lh dist/

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true

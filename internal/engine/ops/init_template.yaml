# gaal.yaml — generated by "gaal init"
#
# Manage three types of local resources from this single file:
#   repositories  — clone / update multi-protocol VCS repos
#   skills        — install SKILL.md collections into AI agent directories
#   mcps          — upsert MCP server entries into agent JSON config files
#
# Run once:           gaal sync
# Run as service:     gaal sync --service --interval 10m
# Check state:        gaal status
# Discover installed: gaal audit
# Validate schema:    gaal schema -f schema.json
#
# Full reference:     docs/quick_start.md

# gaal Lite config schema version — stable forever.
version: 1

# ─────────────────────────────────────────────────────────────────────────────
# repositories
#
# Clone or update local copies of remote repositories.
# Keys are local destination paths (relative to the working directory or absolute).
#
# Supported types: git, hg, svn, bzr, tar, zip
#
# Fields:
#   type    — VCS backend (required)
#   url     — remote URL (required)
#   version — branch, tag, commit SHA, or SVN revision (optional)
#
# Example:
#   src/my-service:
#     type: git
#     url: https://github.com/my-org/my-service.git
#     version: main
# ─────────────────────────────────────────────────────────────────────────────
repositories: {
  
}

# ─────────────────────────────────────────────────────────────────────────────
# skills
#
# Download and install SKILL.md collections into AI agent directories.
#
# Sources:
#   - GitHub shorthand:  owner/repo
#   - Full URL:          https://github.com/owner/repo
#   - SSH:               git@github.com:owner/repo.git
#   - Local path:        ./path/to/skills  or  ~/my-skills
#
# Fields:
#   source  — skill repository (required)
#   agents  — list of agent names, or ["*"] to auto-detect installed agents
#   global  — true → user-wide (~/.copilot/skills …), false → project-local (default)
#   select  — specific skill names to install; empty = all skills in the repo
#
# Supported agents: amp, claude-code, cursor, github-copilot, cline, roo,
#   codex, continue, gemini-cli, goose, kilo, kiro-cli, opencode, openhands,
#   trae, warp, windsurf, …  (run "gaal info agent" for the full list)
#
# Example:
#   - source: vercel-labs/agent-skills
#     agents: ["*"]
#     global: false
# ─────────────────────────────────────────────────────────────────────────────
skills: [

]

# ─────────────────────────────────────────────────────────────────────────────
# mcps
#
# Upsert MCP (Model Context Protocol) server entries into agent JSON config files.
# Existing entries in the target file are preserved; only the named key is updated.
#
# Fields:
#   name    — server key inside "mcpServers" (required)
#   target  — absolute path to the agent JSON config file (required)
#             common values:
#               ~/.config/claude/claude_desktop_config.json  (Claude Desktop)
#               ~/.vscode/settings.json                      (VS Code / Copilot)
#   inline  — inline server definition (mutually exclusive with source)
#               command — executable to run
#               args    — argument list
#               env     — environment variables map (optional)
#   source  — URL to a remote JSON file containing an "mcpServers" document
#
# Example:
#   - name: filesystem
#     target: ~/.config/claude/claude_desktop_config.json
#     inline:
#       command: uvx
#       args: [mcp-server-filesystem, /home/user/projects]
# ─────────────────────────────────────────────────────────────────────────────
mcps: [

]

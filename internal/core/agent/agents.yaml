# Built-in agent registry.
# Each entry maps an agent identifier to its file-system layout.
#
# Fields (*_dir):
#   project_skills_dir      – skills directory relative to the project root (must be relative, no "..")
#   global_skills_dir       – skills directory under the user home directory (~/ prefix required)
#   project_mcp_config_file – path to the agent's MCP server config file (~/ prefix, empty if unsupported)
#
# Fields (*_search) — used by "gaal audit" for discovery only:
#   project_skills_search   – project-relative dirs scanned at 1 level (empty = fallback to project_skills_dir)
#   global_skills_search    – home-relative dirs (~/) scanned at 1 level (empty = fallback to global_skills_dir)
#   pm_skills_search        – home-relative dirs (~/) from the agent's package manager, scanned recursively
#
# Custom agents can be added by creating a file at:
#   $XDG_CONFIG_HOME/gaal/agents.yaml   (Linux)
#   $XDG_CONFIG_HOME/gaal/agents.yaml   (macOS, defaults to ~/.config/gaal/agents.yaml)
#   %AppData%\gaal\agents.yaml          (Windows)
# Custom entries extend the built-in list. They cannot override built-in entries.

# YAML anchors for shared path literals.
# The "defaults" mapping is ignored by the struct decoder (only "agents" is mapped).
defaults:
  project_skills_dir: &psd .agents/skills           # shared convention (~half of agents)
  global_agents_skills: &gas ~/.agents/skills        # cline, warp
  vscode_mcp_config: &vmc ~/.vscode/settings.json    # cline, github-copilot, roo

# Shared search lists (anchors for re-use across agents).
search_defaults:
  # Common project-level skill directories shared across ecosystems.
  common_project_search: &cps
    - .agents/skills
    - .github/skills
    - .claude/skills
  # Common global skill directories shared across ecosystems.
  common_global_search: &cgs
    - ~/.agents/skills
    - ~/.copilot/skills
    - ~/.claude/skills

agents:
  amp:
    project_skills_dir: *psd
    global_skills_dir: ~/.config/agents/skills
    project_mcp_config_file: ~/.config/amp/settings.json
    project_skills_search: *cps
    global_skills_search:
      - ~/.config/agents/skills
      - ~/.agents/skills
      - ~/.copilot/skills
      - ~/.claude/skills
    pm_skills_search: []

  antigravity:
    project_skills_dir: *psd
    global_skills_dir: ~/.gemini/antigravity/skills
    project_mcp_config_file: ""
    project_skills_search: *cps
    global_skills_search:
      - ~/.gemini/antigravity/skills
      - ~/.gemini/skills
      - ~/.agents/skills
    pm_skills_search: []

  augment:
    project_skills_dir: .augment/skills
    global_skills_dir: ~/.augment/skills
    project_mcp_config_file: ~/.augment/settings.json
    project_skills_search:
      - .augment/skills
      - .agents/skills
      - .github/skills
      - .claude/skills
    global_skills_search:
      - ~/.augment/skills
      - ~/.agents/skills
      - ~/.copilot/skills

      - .agents/skills
      - .github/skills
    global_skills_search:
      - ~/.claude/skills
      - ~/.agents/skills
      - ~/.copilot/skills
    pm_skills_search:
      - ~/.claude/plugins/cache

  cline:
    project_skills_dir: *psd
    global_skills_dir: *gas
    project_mcp_config_file: *vmc
    project_skills_search: *cps
    global_skills_search: *cgs
